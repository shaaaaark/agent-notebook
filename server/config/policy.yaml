version: phase5-v1

retrieve:
  top_k: 8
  top_k_vec: 50
  top_k_bm25: 50
  fused_top_n: 30
  rerank_top_m: 8
  rrf_k: 60
  min_score_threshold: 0.05
  lexical_signal:
    min_bm25_score: 0.01
    min_bm25_hits: 1
    min_rrf_score: 0.05

context:
  max_context_tokens: 2000
  max_chunks_per_source: 2
  min_selected_chunks: 3
  min_incremental_coverage: 0.05

generation:
  model: gpt-5.4
  max_tokens: 1024
  temperature: 0
  answer_strategy: direct_grounded
  require_citations: true
  max_evidence_points: 4
  direct_grounded_answer_rule_template: 1. 先直接回答用户问题，优先总结“根本原因 / 关键结论 / 核心步骤”，不要先说资料不足。
  cautious_grounded_answer_rule_template: 1. 先说明当前证据能确认的结论范围，再回答用户问题；如果证据不能覆盖关键前提，要明确指出。
  clarify_message_template: 当前知识库中未找到与「{{question}}」相关的证据。建议：① 上传相关文档后重新提问；② 换一种表述方式。
  abstain_message_template: 当前知识库中关于「{{question}}」的证据不足，且该问题可能涉及高风险判断。基于现有资料我不能直接下结论，建议补充更权威的文档后再提问。

guardrails:
  abstain_threshold: 0.35
  retrieve_timeout_ms: 3000
  rerank_timeout_ms: 5000
  llm_timeout_ms: 20000
  enforcement_mode: balanced
  sensitive_patterns:
    - id: medical-abstain
      type: keyword
      pattern: 医疗
      weight: 5
      action: abstain
    - id: diagnosis-abstain
      type: regex
      pattern: '(诊断|diagnos(is|e))'
      weight: 5
      action: abstain
  risk_intents:
    - id: legal-clarify
      type: phrase
      pattern: 法律意见
      weight: 3
      action: clarify
    - id: finance-warning
      type: regex
      pattern: '(投资|金融|finance)'
      weight: 1
      action: allow_with_warning
  weak_signal_ratio: 0.35
  weak_signal_floor: 0.01
  weak_signal_hits: 2
  weak_signal_window: 3
  weak_signal_lexical_threshold: 1
